version: '3.8'

services:
  hbbs:
    container_name: rustdesk-hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs -r ${RUSTDESK_RELAY_HOST:-202.61.192.237}:21117
    volumes:
      - ./data:/root
    ports:
      - "21115:21115/tcp"
      - "21116:21116/tcp"
      - "21116:21116/udp"
      - "21118:21118/tcp"  # Web client (optional)
    restart: unless-stopped
    environment:
      - ALWAYS_USE_RELAY=${ALWAYS_USE_RELAY:-N}

  hbbr:
    container_name: rustdesk-hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr
    volumes:
      - ./data:/root
    ports:
      - "21117:21117/tcp"
      - "21119:21119/tcp"  # Web client (optional)
    restart: unless-stopped
    depends_on:
      - hbbs
